version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: cloaka-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cloaka
      POSTGRES_USER: cloaka
      POSTGRES_PASSWORD: cloaka
    ports:
      - "5432:5432"
    volumes:
      - cloaka-postgres-data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: cloaka-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  cloaka-postgres-data:
